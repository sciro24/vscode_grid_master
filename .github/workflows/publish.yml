name: Publish

# Pubblica su VS Marketplace e Open VSX. Triggerato in due modi:
#   1) workflow_call — invocato da release.yml dopo il bump auto.
#   2) push del tag v* — fallback manuale (vedi PUBLISH.md "Fallback manuale").
#
# Nota: quando release.yml pusha un tag con GITHUB_TOKEN, il push NON triggera
# altri workflow (protezione anti-loop di GitHub Actions). Per questo
# release.yml chiama publish.yml direttamente come reusable workflow.

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    secrets:
      VSCE_PAT:
        required: true
      OVSX_PAT:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # When called from release.yml the bump commit may be on main but
          # the tag points there too, so default checkout is fine. Explicit
          # ref ensures we always grab the tagged commit when push-tag triggers.
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install webview deps
        run: cd webview-ui && npm ci

      - name: Build
        run: npm run build

      - name: Publish to VS Marketplace
        run: npm run publish:vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npm run publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
